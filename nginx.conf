server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # Priorizar HTML pré-renderizado para páginas indexáveis de SEO.
    # Se não existir um index.html específico da rota, cai no SPA.
    location /filme/ {
        try_files $uri $uri/ $uri/index.html /index.html;
    }

    location /onde-assistir/ {
        try_files $uri $uri/ $uri/index.html /index.html;
    }

    # SPA routing - fallback para o restante da aplicação
    location / {
        try_files $uri $uri/ $uri/index.html /index.html;
    }

    # Cache para assets estáticos
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|webp|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # No cache para o shell principal da SPA
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # HTML pré-renderizado deve ser revalidado com frequência pelos crawlers
    location ~ ^/(filme|onde-assistir)/.+/index\.html$ {
        add_header Cache-Control "public, max-age=300, s-maxage=300, stale-while-revalidate=86400";
    }

    location = /robots.txt {
        add_header Cache-Control "public, max-age=3600";
    }

    location = /sitemap.xml {
        add_header Cache-Control "public, max-age=3600";
    }

    # Health check
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
